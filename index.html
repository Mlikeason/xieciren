<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="写词人">
<meta name="theme-color" content="#1a1a1a">
<title>写词人</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="stylesheet" href="style.css">
</head>
<body class="foot-open">

<header class="topbar">
  <div class="brand" id="brandBtn">写词人</div>
  <div class="search">
    <div class="scope-wrap" id="scopeWrap">
      <button class="scope-btn" id="scopeBtn" type="button">歌名<svg viewBox="0 0 12 12" aria-hidden="true"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="scope-menu" id="scopeMenu" hidden>
        <button type="button" data-value="all">全部</button>
        <button type="button" data-value="lyric">歌词</button>
        <button type="button" data-value="title" class="active">歌名</button>
        <button type="button" data-value="artist">歌手</button>
        <button type="button" data-value="lyricist">词人</button>
      </div>
    </div>
    <svg class="search-icon" viewBox="0 0 16 16" aria-hidden="true">
      <circle cx="7" cy="7" r="5.25" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <input id="q" type="search" placeholder=""
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="qclear" class="qclear" type="button" aria-label="清除" hidden>×</button>
  </div>
</header>

<nav class="chipsbar" id="chipsbar" aria-label="词人快筛">
  <div class="chips" id="chips"></div>
</nav>

<main class="layout">
  <button class="back" id="back" type="button" aria-label="返回">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M10 3.5L5.5 8 10 12.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <section class="results" id="results" aria-label="搜索结果">
    <div class="empty">输入关键词开始搜索<br>或点击上方词人快筛</div>
  </section>
  <aside class="detail" id="detail" aria-label="歌曲详情">
    <div class="detail-inner">
      <div class="empty">从左侧选一首歌</div>
    </div>
  </aside>
</main>

<div class="quote-popover" id="quotePopover" hidden>
  <button data-action="save" type="button" aria-label="收藏金句">★</button>
  <button data-action="share" type="button">分享</button>
  <button data-action="copy" type="button">复制</button>
  <button data-action="delete" type="button">删除</button>
</div>

<div class="toast" id="toast" hidden></div>

<div class="about-overlay" id="aboutOverlay" hidden>
  <div class="about-card">
    <button class="about-close" id="aboutClose" type="button" aria-label="关闭">×</button>
    <h2>关于写词人</h2>
    <p>写词人是一个中文歌词搜索与收藏工具。</p>
    <p>我们听歌的时候，常常被某一句歌词击中。那些句子在旋律里一闪而过，却留下很深的印记。我做这个网站，是想让那些被忽略的文字重新被看见——不是作为歌曲的附属品，而是作为独立的、值得品味的文学作品。</p>
    <p>每一首歌词的背后，都有一位写词人。他们用几十个字讲完别人用一本书才能说清的事。林夕、黄伟文、方文山、姚谦……这些名字，值得被更多人认识。</p>
    <p>在这里，你可以搜索十万首华语歌词，收藏打动你的金句，把它分享给同样会被文字击中的人。</p>
    <p class="about-sign">M · 2025</p>
  </div>
</div>

<footer class="foot" id="foot">
  <button class="foot-toggle" id="footToggle" aria-label="展开信息" title="信息">
    <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 10l5-5 5 5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="foot-content" id="footContent">—</div>
  <button class="about-link" id="aboutBtn" type="button">关于</button>
</footer>

<script src="app.js"></script>
</body>
</html>
